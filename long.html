<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Watch Full Video</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: linear-gradient(145deg, #0a100d, #0a1a0f);
      border: 1px solid #30d158;
      border-radius: 20px;
      padding: 36px 24px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 0 40px rgba(48, 209, 88, 0.15);
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .sub {
      font-size: 14px;
      color: #bbb;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .reward-badge {
      display: inline-block;
      background: rgba(48, 209, 88, 0.12);
      border: 1px solid rgba(48, 209, 88, 0.35);
      color: #30d158;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 28px;
    }
    #adBtn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #30d158, #1a8c38);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    #adBtn:active { transform: scale(0.97); }
    #adBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      margin-top: 18px;
      font-size: 14px;
      color: #aaa;
      min-height: 20px;
      transition: color 0.3s;
    }
    #status.success { color: #30d158; }
    #status.error   { color: #ff453a; }
    .note {
      margin-top: 24px;
      font-size: 12px;
      color: #555;
    }
    #countdown {
      margin-top: 14px;
      font-size: 28px;
      font-weight: 800;
      color: #30d158;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💦</div>
    <h1>Watch Full Long Video</h1>
    <p class="sub">Tap the button below to open the ad link, then come back — the full high-def video drops straight into your chat 🥵</p>
    <div class="reward-badge">🎁 1 Click → Get Full Video</div>
    <button id="adBtn" onclick="watchAd()">📺 Watch Ad to Unlock 🎬</button>
    <div id="status"></div>
    <div id="countdown"></div>
    <p class="note">Ad powered by Monetag SmartLink • Takes ~3 seconds</p>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.setHeaderColor('#0d0d0d');
    tg.setBackgroundColor('#0d0d0d');

    const SMART_LINK = "https://omg10.com/4/11210079";
    const btn       = document.getElementById('adBtn');
    const status    = document.getElementById('status');
    const countdown = document.getElementById('countdown');

    function watchAd() {
      btn.disabled     = true;
      btn.textContent  = '⏳ Opening Ad...';
      status.className = '';
      status.textContent = '';
      countdown.style.display = 'none';

      // Open the Monetag SmartLink in a new tab
      window.open(SMART_LINK, '_blank');

      status.className   = 'info';
      status.style.color = '#ffd60a';
      status.textContent = '✅ Ad link opened! Delivering your video...';

      // Countdown 3 → 1, then send data and close
      let seconds = 3;
      countdown.style.display = 'block';
      countdown.textContent = seconds;

      const interval = setInterval(() => {
        seconds--;
        countdown.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(interval);
          countdown.style.display = 'none';

          // Send completion data to the bot
          tg.sendData(JSON.stringify({ action: 'ad_complete', type: 'long' }));

          status.className   = 'success';
          status.style.color = '#30d158';
          status.textContent = '✅ Done! Sending your video now...';
          btn.textContent    = '✅ Ad Complete!';

          // Close the webapp
          setTimeout(() => tg.close(), 500);
        }
      }, 1000);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Today's 3 Odds Prediction</title>
    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <!-- AdsGram SDK (rewarded video) -->
    <script src="https://sad.adsgram.ai/js/sad.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: linear-gradient(145deg, #0a0a1a, #120a1f);
            border: 1px solid #f5a623;
            border-radius: 20px;
            padding: 36px 24px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 0 40px rgba(245, 166, 35, 0.18);
        }

        .icon {
            font-size: 52px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .sub {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .reward-badge {
            display: inline-block;
            background: rgba(245, 166, 35, 0.15);
            border: 1px solid rgba(245, 166, 35, 0.4);
            color: #f5a623;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 28px;
        }

        #adBtn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f5a623, #d4891a);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        #adBtn:active {
            transform: scale(0.97);
        }

        #adBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status {
            margin-top: 18px;
            font-size: 14px;
            color: #aaa;
            min-height: 20px;
            transition: color 0.3s;
        }

        #status.success {
            color: #30d158;
        }

        #status.error {
            color: #ff453a;
        }

        .note {
            margin-top: 24px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⚽</div>
        <h1>Unlock Today's 3 Odds Prediction</h1>
        <p class="sub">Watch a quick video ad and get today's 3 odds prediction delivered to your chat instantly 🔥</p>
        <div class="reward-badge">🎁 Watch 1 Ad → Get 3 Odds Prediction</div>
        <button id="adBtn">▶️ Watch Video Ad 🎬</button>
        <div id="status"></div>
        <p class="note">Powered by AdsGram • Rewarded video • ~15-30 seconds</p>
    </div>

    <script>
        // 1. Telegram WebApp setup
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#0d0d0d');
        tg.setBackgroundColor('#0d0d0d');

        // 2. DOM references
        const btn = document.getElementById('adBtn');
        const status = document.getElementById('status');

        // 3. Initialize AdsGram with your block ID (rewarded video)
        const AdController = window.Adsgram.init({
            blockId: "36906",
            debug: false // set to true if you need console logs during testing
        });

        // 4. Ad click handler
        btn.addEventListener('click', async () => {
            // Disable button and show loading state
            btn.disabled = true;
            btn.textContent = '⏳ Loading Ad...';
            status.className = '';
            status.textContent = '';

            try {
                // Show the rewarded video ad
                const result = await AdController.show();

                // ✅ Ad watched to completion – reward the user
                status.className = 'success';
                status.textContent = '✅ Ad verified! Sending your prediction now...';
                btn.textContent = '✅ Ad Complete!';

                // Send data to your Telegram bot (the mini app's bot)
                tg.sendData(JSON.stringify({
                    action: 'ad_complete',
                    type: 'odds',
                    platform: 'adsgram',
                    blockId: '36906'
                }));

                // Optionally close the mini app after a short delay
                setTimeout(() => tg.close(), 1800);

            } catch (error) {
                // ❌ Ad was skipped, failed, or an error occurred – no reward
                btn.disabled = false;
                btn.textContent = '▶️ Watch Video Ad 🎬';
                status.className = 'error';
                status.textContent = '❌ Ad not completed. Please try again or use ⭐ Stars instead.';
                console.error('AdsGram error:', error);
            }
        });

        // 5. (Optional) Listen for specific AdsGram events for extra feedback
        AdController.addEventListener('onStart', () => {
            console.log('Ad started playing');
            status.textContent = '⏳ Watching ad...';
        });

        AdController.addEventListener('onReward', () => {
            console.log('User earned reward (but we handle in show() promise)');
        });

        AdController.addEventListener('onSkip', () => {
            console.log('User skipped the ad');
            // The promise will reject, so we handle there.
        });

        AdController.addEventListener('onError', (err) => {
            console.error('Ad error:', err);
            // The promise will also reject.
        });

        // Log initialization success
        console.log('✓ AdsGram initialized with blockId 36906 (rewarded video)');
    </script>
</body>
</html>

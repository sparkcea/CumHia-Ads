<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Today's 3 Odds Prediction</title>
    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <!-- AdsGram SDK (rewarded video) -->
    <script src="https://sad.adsgram.ai/js/sad.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: linear-gradient(145deg, #0a0a1a, #120a1f);
            border: 1px solid #f5a623;
            border-radius: 20px;
            padding: 36px 24px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 0 40px rgba(245, 166, 35, 0.18);
        }

        .icon {
            font-size: 52px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .sub {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 22px;
            line-height: 1.6;
        }

        .divider {
            margin: 16px 0 12px;
            font-size: 13px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #333;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-ad {
            background: linear-gradient(135deg, #f5a623, #d4891a);
            color: #fff;
        }

        .btn-stars {
            background: linear-gradient(135deg, #ffd700, #e6b800);
            color: #1a1a1a;
        }

        #status {
            margin-top: 18px;
            font-size: 14px;
            color: #aaa;
            min-height: 20px;
            transition: color 0.3s;
        }

        #status.success {
            color: #30d158;
        }
        #status.error {
            color: #ff453a;
        }

        .note {
            margin-top: 24px;
            font-size: 12px;
            color: #555;
        }

        .policy-note {
            margin-top: 12px;
            font-size: 11px;
            color: #3a3a3a;
            border-top: 1px solid #222;
            padding-top: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⚽</div>
        <h1>Today's 3 Odds Prediction</h1>
        <p class="sub">Get your winning odds – choose your preferred way:</p>

        <div class="btn-group">
            <!-- Ad button (rewarded video) -->
            <button id="adBtn" class="btn btn-ad">▶️ Watch Video Ad (free)</button>

            <div class="divider">or</div>

            <!-- Stars button (no ad) -->
            <button id="starsBtn" class="btn btn-stars">⭐ Pay with Stars (no ad)</button>
        </div>

        <div id="status"></div>

        <p class="note">Powered by AdsGram • Rewarded video • Stars supported</p>
        <p class="policy-note">🔹 You can always choose the Stars option – ads are completely optional.</p>
    </div>

    <script>
        // ----- 1. Telegram WebApp setup -----
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#0d0d0d');
        tg.setBackgroundColor('#0d0d0d');

        // ----- 2. DOM references -----
        const adBtn = document.getElementById('adBtn');
        const starsBtn = document.getElementById('starsBtn');
        const status = document.getElementById('status');

        // ----- 3. AdsGram initialization (blockId 36919) -----
        const AdController = window.Adsgram.init({
            blockId: "36919",
            debug: false   // set to true only for testing
        });

        // ----- 4. Event: Watch Video Ad (rewarded) -----
        adBtn.addEventListener('click', async () => {
            adBtn.disabled = true;
            adBtn.textContent = '⏳ Loading Ad...';
            status.className = '';
            status.textContent = '';

            try {
                // Show the rewarded video – this promise resolves only if user watches till end
                await AdController.show();

                // ✅ Ad completed – give the reward
                status.className = 'success';
                status.textContent = '✅ Ad verified! Sending prediction...';
                tg.sendData(JSON.stringify({ action: 'ad_complete' }));
                setTimeout(() => tg.close(), 1800);

            } catch (error) {
                // ❌ Ad skipped, failed, or error – no reward
                adBtn.disabled = false;
                adBtn.textContent = '▶️ Watch Video Ad (free)';
                status.className = 'error';
                status.textContent = '❌ Ad not completed. Try again or use Stars.';
                console.error('Ad error:', error);
            }
        });

        // ----- 5. Event: Pay with Stars (no ad) -----
        starsBtn.addEventListener('click', () => {
            starsBtn.disabled = true;
            starsBtn.textContent = '⏳ Processing...';
            status.className = '';
            status.textContent = '';

            // Send request to bot – it will handle the Stars payment flow
            tg.sendData(JSON.stringify({ action: 'stars_payment' }));

            // Give user feedback – bot will reply with invoice or confirmation
            status.className = 'success';
            status.textContent = '⭐ Stars payment initiated – check your chat!';
            starsBtn.disabled = false;
            starsBtn.textContent = '⭐ Pay with Stars (no ad)';

            // Close mini app after a moment (optional)
            setTimeout(() => tg.close(), 2000);
        });

        // ----- 6. (Optional) AdsGram event listeners for UX -----
        AdController.addEventListener('onStart', () => {
            status.textContent = '⏳ Watching ad...';
        });

        // Log success
        console.log('✅ AdsGram initialized with blockId 36919 (rewarded video)');
        console.log('✅ Two options available: ad (free) or Stars (no ad) – moderation compliant.');
    </script>
</body>
</html>

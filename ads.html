<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Unlock Her Full Leak</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: linear-gradient(145deg, #0a0a1a, #120a1f);
      border: 1px solid #bf5fff;
      border-radius: 20px;
      padding: 36px 24px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 0 40px rgba(191, 95, 255, 0.18);
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .sub {
      font-size: 14px;
      color: #bbb;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .reward-badge {
      display: inline-block;
      background: rgba(191, 95, 255, 0.15);
      border: 1px solid rgba(191, 95, 255, 0.4);
      color: #bf5fff;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 28px;
    }
    #adBtn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #bf5fff, #7c00cc);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    #adBtn:active { transform: scale(0.97); }
    #adBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      margin-top: 18px;
      font-size: 14px;
      color: #aaa;
      min-height: 20px;
      transition: color 0.3s;
    }
    #status.success { color: #30d158; }
    #status.error   { color: #ff453a; }
    .note {
      margin-top: 24px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🍑</div>
    <h1>Unlock Her Full Leak</h1>
    <p class="sub">Watch a quick video ad and the full uncensored leak lands in your chat instantly 🔥</p>
    <div class="reward-badge">🎁 Watch 1 Ad → Get Full Leak</div>
    <button id="adBtn" disabled>⏳ Loading...</button>
    <div id="status"></div>
    <p class="note">Ad powered by AdsGram • Takes ~15 seconds</p>
  </div>

  <script>
    // Initialize Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.setHeaderColor('#0d0d0d');
    tg.setBackgroundColor('#0d0d0d');

    const btn = document.getElementById('adBtn');
    const status = document.getElementById('status');

    // Load AdsGram SDK
    function loadAdsGram() {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://sad.adsgram.ai/js/sad.min.js';
        script.onload = resolve;
        script.onerror = () => reject(new Error('Failed to load AdsGram SDK'));
        document.head.appendChild(script);
      });
    }

    // Initialize
    async function init() {
      try {
        await loadAdsGram();

        // Initialize AdsGram with blockId
        const AdController = window.Adsgram.init({
          blockId: "37388",
          debug: false
        });

        btn.disabled = false;
        btn.textContent = '📺 Watch Ad to Unlock 🎬';
        btn.onclick = () => showAd(AdController);

      } catch (error) {
        btn.textContent = '❌ Ad Unavailable';
        btn.style.background = '#ff453a';
        status.textContent = 'Could not load ad system. Please try again later.';
        status.className = 'error';
      }
    }

    // Show ad
    function showAd(AdController) {
      btn.disabled = true;
      btn.textContent = '⏳ Loading Ad...';
      status.className = '';
      status.textContent = '';

      AdController.show()
        .then((result) => {
          if (result && result.done) {
            // Ad watched completely - reward user
            status.className = 'success';
            status.textContent = '✅ Done! Sending your leak now...';
            btn.textContent = '✅ Ad Complete!';

            // Send data to bot - this triggers web_app_data handler
            tg.sendData(JSON.stringify({ action: 'ad_complete', type: 'leaks' }));

            // Close after short delay
            setTimeout(() => tg.close(), 1500);
          } else {
            // Ad closed early - no reward
            btn.disabled = false;
            btn.textContent = '📺 Watch Ad to Unlock 🎬';
            status.className = 'error';
            status.textContent = '❌ Please watch the full ad to unlock your content.';
          }
        })
        .catch((error) => {
          btn.disabled = false;
          btn.textContent = '📺 Watch Ad to Unlock 🎬';
          status.className = 'error';
          status.textContent = '❌ ' + (error.description || error.message || 'Ad failed. Please try again.');
        });
    }

    // Start initialization
    init();
  </script>
</body>
</html>

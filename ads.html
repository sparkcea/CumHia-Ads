<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Unlock Today's 3 Odds Prediction</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <script src="https://ads.adsgram.ai/script.js">
    </script>
    <script>
        window.ADSGRAM_BLOCK_ID = "36837";
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d0d0d;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: linear-gradient(145deg, #0a0a1a, #120a1f);
            border: 1px solid #f5a623;
            border-radius: 20px;
            padding: 36px 24px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 0 40px rgba(245, 166, 35, 0.18);
        }

        .icon {
            font-size: 52px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .sub {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .reward-badge {
            display: inline-block;
            background: rgba(245, 166, 35, 0.15);
            border: 1px solid rgba(245, 166, 35, 0.4);
            color: #f5a623;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 28px;
        }

        #adBtn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f5a623, #d4891a);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        #adBtn:active {
            transform: scale(0.97);
        }

        #adBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status {
            margin-top: 18px;
            font-size: 14px;
            color: #aaa;
            min-height: 20px;
            transition: color 0.3s;
        }

        #status.success {
            color: #30d158;
        }

        #status.error {
            color: #ff453a;
        }

        .note {
            margin-top: 24px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⚽</div>
        <h1>Unlock Today's 3 Odds Prediction</h1>
        <p class="sub">Watch a quick video ad and get today's 3 odds prediction delivered to your chat instantly 🔥</p>
        <div class="reward-badge">🎁 Watch 1 Ad → Get 3 Odds Prediction</div>
        <button id="adBtn" onclick="watchAd()">▶️ Watch Video Ad 🎬</button>
        <div id="status"></div>
        <p class="note">Powered by AdsGram • Video format • ~15-30 seconds</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#0d0d0d');
        tg.setBackgroundColor('#0d0d0d');

        let adController = null;

        // Initialize AdsGram when page loads
        window.addEventListener('load', async () => {
            try {
                adController = window.AdController.init();
                console.log('✓ AdsGram initialized');
            } catch (e) {
                console.error('AdsGram init error:', e);
            }
        });

        async function watchAd() {
            if (!adController) {
                console.error('AdsGram not initialized');
                updateStatus('⚠️ Ad system loading...', 'error');
                return;
            }

            const btn = document.getElementById('adBtn');
            const status = document.getElementById('status');
            btn.disabled = true;
            btn.textContent = '⏳ Loading Ad...';
            status.className = '';
            status.textContent = '';

            try {
                // Show the AdsGram rewarded video ad
                const result = await adController.show();

                // Ad watched successfully
                status.className = 'success';
                status.textContent = '✅ Ad verified! Sending your prediction now...';
                btn.textContent = '✅ Ad Complete!';

                // Send data back to bot
                tg.sendData(JSON.stringify({
                    action: 'ad_complete',
                    type: 'odds',
                    platform: 'adsgram'
                }));

                setTimeout(() => tg.close(), 1800);
            } catch (error) {
                // Ad skipped or error occurred
                btn.disabled = false;
                btn.textContent = '▶️ Watch Video Ad 🎬';
                status.className = 'error';
                status.textContent = '❌ Ad not completed. Please try again or use ⭐ Stars instead.';
                console.error('AdsGram error:', error);
            }
        }
    </script>
</body>
</html>

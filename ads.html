<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Unlock Her Full Leak</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: linear-gradient(145deg, #0a0a1a, #120a1f);
      border: 1px solid #bf5fff;
      border-radius: 20px;
      padding: 36px 24px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 0 40px rgba(191, 95, 255, 0.18);
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .sub {
      font-size: 14px;
      color: #bbb;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .reward-badge {
      display: inline-block;
      background: rgba(191, 95, 255, 0.15);
      border: 1px solid rgba(191, 95, 255, 0.4);
      color: #bf5fff;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 28px;
    }
    #adBtn, #claimBtn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #bf5fff, #7c00cc);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    #adBtn:active, #claimBtn:active { transform: scale(0.97); }
    #adBtn:disabled, #claimBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #claimBtn {
      background: linear-gradient(135deg, #30d158, #1a9b3a);
      display: none;
    }
    #status {
      margin-top: 18px;
      font-size: 14px;
      min-height: 20px;
      transition: color 0.3s;
    }
    #status.success { color: #30d158; }
    #status.error   { color: #ff453a; }
    #status.info    { color: #ffd60a; }
    .note {
      margin-top: 24px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🍑</div>
    <h1>Unlock Her Full Leak</h1>
    <p class="sub">Watch a quick video ad and the full uncensored leak lands in your chat instantly 🔥</p>
    <div class="reward-badge">🎁 Watch 1 Ad → Get Full Leak</div>

    <button id="adBtn" onclick="watchAd()">📺 Watch Ad to Unlock 🎬</button>
    <button id="claimBtn" onclick="claimLeak()">🔥 View Her Leaks</button>

    <div id="status"></div>
    <p class="note">Ad powered by AdsGram • Takes ~15 seconds</p>
  </div>

  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
  <script>
    // ─── Telegram WebApp ──────────────────────────────
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.setHeaderColor('#0d0d0d');
    tg.setBackgroundColor('#0d0d0d');

    // ─── AdsGram SDK ──────────────────────────────────
    const AdController = window.Adsgram.init({
      blockId: "37388",
      debug: false
    });

    const adBtn = document.getElementById('adBtn');
    const claimBtn = document.getElementById('claimBtn');
    const status = document.getElementById('status');
    let adCompleted = false;

    // ─── Watch Ad ─────────────────────────────────────
    function watchAd() {
      adBtn.disabled = true;
      adBtn.textContent = '⏳ Loading Ad...';
      status.className = '';
      status.textContent = '';

      AdController.show()
        .then((result) => {
          if (result.done) {
            adCompleted = true;
            status.className = 'success';
            status.textContent = '✅ Ad watched! Tap "View Her Leaks" below.';
            adBtn.style.display = 'none';
            claimBtn.style.display = 'block';
          } else {
            adBtn.disabled = false;
            adBtn.textContent = '📺 Watch Ad to Unlock 🎬';
            status.className = 'error';
            status.textContent = '❌ Please watch the FULL ad.';
          }
        })
        .catch((err) => {
          adBtn.disabled = false;
          adBtn.textContent = '📺 Watch Ad to Unlock 🎬';
          status.className = 'error';
          status.textContent = '❌ ' + (err.description || err.message || 'Ad failed.');
        });
    }

    // ─── Claim Leak ──────────────────────────────────
    async function claimLeak() {
      if (!adCompleted) {
        status.className = 'error';
        status.textContent = '❌ Watch the ad first!';
        return;
      }

      claimBtn.disabled = true;
      claimBtn.textContent = '⏳ Delivering...';
      status.className = 'info';
      status.textContent = '📤 Sending your content...';

      const userId = tg.initDataUnsafe?.user?.id;
      if (!userId) {
        status.className = 'error';
        status.textContent = '❌ User ID not found.';
        claimBtn.disabled = false;
        claimBtn.textContent = '🔥 View Her Leaks';
        return;
      }

      try {
        // ─── Your AWS server endpoint ─────────────────────
        const resp = await fetch('http://16.171.177.92:5000/deliver-leak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId })
        });
        const result = await resp.json();
        if (!resp.ok) throw new Error(result.error || 'Delivery failed');

        status.className = 'success';
        status.textContent = `✅ Delivered! ${result.sent} videos sent.`;
      } catch (err) {
        status.className = 'error';
        status.textContent = '❌ ' + err.message;
        claimBtn.disabled = false;
        claimBtn.textContent = '🔥 View Her Leaks';
        return;
      }

      // Close miniapp after 0.5s
      setTimeout(() => tg.close(), 500);
    }
  </script>
</body>
</html>
